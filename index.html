<!--Personal Profile Card Project-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="outer-box"></div>
    <div id="inner-box">
        <div id="inner-circle">
            <img src="./Profile-picture(circle) (hd).png" alt="profile picture"/>
        </div>
    <div id="back-circle"></div>
    </div>
    <div >
        <p class="content">Bhavesh Kshirsagar</p>
        <p id="information">Developer | Cyber-Security</p>
    </div>
    <div id="icon">
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-x-twitter"></i>
        <i class="fa-brands fa-linkedin"></i>
        <i class="fa-brands fa-medium"></i>
    </div>
    <div id="thank-you">
       <p>Thank you</p> 
    </div>
    <div id="final-icon">
        <i class="fa-brands fa-html5"></i>
        <i class="fa-brands fa-css3-alt"></i>
    </div>
</body>
</html>
